<audio id="bgm" loop>
  <source src="Main Menu Wii Party Music Extended.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusic()">🔊</button>

<script>
let music = document.getElementById("bgm");

document.addEventListener("click", function(){
  if (music.paused) {
    music.play().catch(() => {});
  }
});

function toggleMusic(){
  if(music.paused){
    music.play();
  } else {
    music.pause();
  }
}
</script>
